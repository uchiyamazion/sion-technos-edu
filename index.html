<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シオンテクノス 教育システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/design-tokens.css">
<style>
  /* このページ固有のスタイルのみここに書く。共通トークンは shared/design-tokens.css を参照 */
  header{
    padding:64px 24px 40px;
    max-width:1000px;
    margin:0 auto;
    text-align:center;
  }
  h1{font-size:clamp(30px,5.5vw,52px);}
  p.lede{
    font-size:15.5px;
    color:var(--text-2);
    max-width:520px;
    margin:18px auto 0;
    line-height:1.9;
  }

  .category-section{
    max-width:1000px;
    margin:0 auto;
    padding:0 24px;
  }
  .category-heading{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.15em;
    color:var(--text-3);
    text-transform:uppercase;
    margin:44px 0 14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .category-heading:first-of-type{margin-top:0;}

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  @media (max-width:720px){.grid{grid-template-columns:1fr;}}

  .card{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:20px;
    padding:28px;
    display:flex;
    flex-direction:column;
    gap:14px;
    text-decoration:none;
    color:inherit;
    transition:border-color .25s ease, transform .25s ease;
  }
  .card.active:hover{border-color:var(--accent); transform:translateY(-3px);}
  .card.disabled{opacity:0.5; cursor:default;}
  .card-tag{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.05em;
    width:fit-content;
    padding:4px 10px;
    border-radius:100px;
  }
  .card.active .card-tag{background:var(--cool); color:#02131f;}
  .card.disabled .card-tag{background:var(--bg-panel-2); color:var(--text-3); border:1px solid var(--line);}
  .card-title{font-family:var(--font-display); font-weight:900; font-size:22px;}
  .card-desc{font-size:13.5px; color:var(--text-2); line-height:1.8;}
  .card-status{font-family:var(--font-mono); font-size:11px; color:var(--text-3); margin-top:auto;}

  .empty-state{
    color:var(--text-3);
    font-family:var(--font-mono);
    font-size:13px;
    text-align:center;
    padding:40px 0;
  }
</style>
</head>
<body class="sion-reset sion-body">
  <header>
    <div class="sion-eyebrow">SION TECHNOS EDUCATION</div>
    <h1 class="sion-title">シオンテクノス<br>教育システム</h1>
    <p class="lede">冷凍・空調・電気の原理から現場の実務知識まで。単元ごとにインタラクティブなアプリで学べる、社内・研修用の教材ポータルです。</p>
  </header>

  <div class="category-section" id="module-sections">
    <div class="empty-state">教材一覧を読み込み中…</div>
  </div>

  <div class="category-section" style="margin-top:44px;">
    <a href="https://uchiyamazion.github.io/sion-portal/" style="
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      background:var(--bg-panel); border:1px solid var(--line); border-radius:20px;
      padding:22px 26px; text-decoration:none; color:inherit;">
      <span>
        <span style="display:block; font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--text-3); text-transform:uppercase; margin-bottom:4px;">BUSINESS APPS</span>
        <span style="display:block; font-family:var(--font-display); font-weight:700; font-size:16px;">点検システム ポータルへ</span>
      </span>
      <span style="font-size:20px; color:var(--text-3);">↗</span>
    </a>
  </div>

  <div class="sion-footer">SION TECHNOS EDUCATION SYSTEM ／ 監修：シオンテクノス株式会社</div>

<script>
/* modules.json を読み込み、category ごとにグルーピングしてカードを自動生成する。
   新しい単元を追加するときは、フォルダを作って modules.json に1件追記するだけでよい。
   file://で開いた場合はfetchがブロックされることがあるため、その場合はエラー表示にフォールバックする。 */
async function loadModules(){
  const container = document.getElementById('module-sections');
  try{
    const res = await fetch('modules.json');
    if(!res.ok) throw new Error('modules.json の読み込みに失敗しました');
    const modules = await res.json();
    renderModules(modules, container);
  }catch(err){
    container.innerHTML = `<div class="empty-state">教材一覧を読み込めませんでした。GitHub Pages等のWebサーバー経由で開いてください。<br><span style="opacity:0.6">(${err.message})</span></div>`;
  }
}

function renderModules(modules, container){
  if(!modules || modules.length === 0){
    container.innerHTML = '<div class="empty-state">まだ教材が登録されていません。</div>';
    return;
  }

  const categories = [...new Set(modules.map(m => m.category))];
  container.innerHTML = '';

  categories.forEach(cat=>{
    const heading = document.createElement('div');
    heading.className = 'category-heading';
    heading.textContent = cat;
    container.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'grid';

    modules.filter(m => m.category === cat).forEach(m=>{
      const isPublished = m.status === 'published';
      const el = document.createElement(isPublished ? 'a' : 'div');
      el.className = 'card ' + (isPublished ? 'active' : 'disabled');
      if(isPublished) el.href = m.path;

      const levelsText = (m.levels && m.levels.length > 0) ? m.levels.join('・') + 'クイズ収録' : '読み物教材';
      const statusText = isPublished ? levelsText : 'COMING SOON';

      el.innerHTML = `
        <span class="card-tag">${isPublished ? '公開中' : '準備中'}</span>
        <div class="card-title">${m.title}</div>
        <div class="card-desc">${m.description}</div>
        <div class="card-status">${statusText}</div>
      `;
      grid.appendChild(el);
    });

    container.appendChild(grid);
  });
}

loadModules();
</script>
</body>
</html>
