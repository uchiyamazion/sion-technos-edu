<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メーカー別資料 管理画面 ／ シオンテクノス教育システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/design-tokens.css">
<style>
  body{padding-bottom:80px;}
  .wrap{max-width:820px; margin:0 auto; padding:32px 20px 0;}
  .back-link{
    display:inline-flex; font-family:var(--font-mono); font-size:12px; color:var(--text-3);
    text-decoration:none; margin-bottom:20px;
  }
  .back-link:hover{color:var(--accent);}
  h1{font-family:var(--font-display); font-weight:900; font-size:24px; margin-bottom:6px;}
  .sub{font-size:13px; color:var(--text-3); margin-bottom:24px;}

  .auth-panel{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:16px;
    padding:20px; margin-bottom:28px;
  }
  .auth-panel .field{margin-bottom:12px;}
  .auth-panel label{display:block; font-size:11.5px; color:var(--text-3); margin-bottom:5px; font-family:var(--font-mono);}
  .auth-panel input{
    width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg-panel-2); color:var(--text-1); font-family:var(--font-mono); font-size:13px;
  }
  .auth-status{font-size:12px; margin-top:8px; font-family:var(--font-mono);}
  .auth-status.ok{color:#5eead4;}
  .auth-status.err{color:#f87171;}

  .maker-card{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:16px;
    padding:20px; margin-bottom:18px;
  }
  .maker-card-head{display:flex; justify-content:space-between; align-items:center; cursor:pointer; gap:12px;}
  .maker-card-head h3{font-family:var(--font-display); font-size:15px;}
  .maker-card-head .mh-sub{font-family:var(--font-mono); font-size:11px; color:var(--text-3);}
  .maker-card-body{display:none; margin-top:18px; border-top:1px solid var(--line); padding-top:18px;}
  .maker-card.open .maker-card-body{display:block;}
  .chev{font-size:14px; color:var(--text-3);}

  label.f-label{display:block; font-size:11.5px; color:var(--text-3); margin-bottom:5px; font-family:var(--font-mono);}
  .field{margin-bottom:14px;}
  input[type=text], input[type=color], textarea{
    width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg-panel-2); color:var(--text-1); font-family:var(--font-body); font-size:13.5px;
  }
  textarea{resize:vertical; min-height:52px;}
  .row2{display:grid; grid-template-columns:1fr 100px; gap:10px;}

  .subitem{
    background:var(--bg-panel-2); border:1px solid var(--line); border-radius:10px;
    padding:12px; margin-bottom:8px; position:relative;
  }
  .subitem .rm{
    position:absolute; top:8px; right:8px; background:none; border:none; color:var(--text-3);
    cursor:pointer; font-size:15px;
  }
  .subitem .rm:hover{color:#f87171;}
  .add-btn{
    width:100%; padding:9px; border:1.5px dashed var(--line); border-radius:8px; background:none;
    color:var(--text-3); font-size:12.5px; cursor:pointer; margin-bottom:14px;
  }
  .add-btn:hover{border-color:var(--accent); color:var(--accent);}

  .section-label{font-family:var(--font-mono); font-size:11px; color:var(--accent); margin:16px 0 8px; text-transform:uppercase;}

  .btn{
    padding:9px 16px; border-radius:8px; border:none; font-size:13px; cursor:pointer; font-family:var(--font-body);
  }
  .btn-save{background:var(--accent); color:#02131f; font-weight:700;}
  .btn-delete{background:none; color:#f87171; border:1px solid rgba(248,113,113,0.4);}
  .btn-row{display:flex; justify-content:space-between; margin-top:16px;}

  .add-maker-btn{
    width:100%; padding:14px; border:1.5px dashed var(--line); border-radius:14px; background:none;
    color:var(--text-2); font-size:13.5px; cursor:pointer; margin-top:8px;
  }
  .add-maker-btn:hover{border-color:var(--accent); color:var(--accent);}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--text-1); color:var(--bg); padding:10px 20px; border-radius:8px; font-size:13px;
    opacity:0; transition:all .25s; pointer-events:none; z-index:300;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .locked-note{font-size:12px; color:var(--text-3); text-align:center; padding:30px;}
</style>
</head>
<body class="sion-reset sion-body">
<div class="wrap">
  <a class="back-link" href="../index.html">← 教材一覧に戻る</a>
  <h1>メーカー別資料 管理画面</h1>
  <div class="sub">追加・編集・削除した内容は GitHub リポジトリ（data/makers.json）に直接コミットされ、公開ページへ反映されます。</div>

  <div class="auth-panel">
    <div class="field">
      <label>GitHub Personal Access Token（このブラウザのみ・保存されません）</label>
      <input type="text" id="pat" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    </div>
    <div class="field" style="margin-bottom:0;">
      <label>編集者名（変更履歴に記録されます）</label>
      <input type="text" id="editorName" placeholder="例：内山" autocomplete="off">
    </div>
    <div id="auth-status" class="auth-status"></div>
  </div>

  <div id="maker-list">
    <div class="locked-note">読み込み中…</div>
  </div>

  <button class="add-maker-btn" id="add-maker-btn">＋ 新しいメーカーを追加</button>
</div>

<div id="toast" class="toast"></div>

<script src="js/admin.js"></script>
</body>
</html>
